<!-- @dsCard group="Brand" viewport="700x180" subtitle="3d-mobility.org — 'ocean-blue' theme, Outfit + Inter" name="3D Mobility (Maker Connect)" -->
<!doctype html>
<html>
  <head>
    <link rel="stylesheet" href="../styles.css" />
    <link rel="stylesheet" href="../tokens/colors-3dmobility.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@600;700&family=Inter:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        margin: 0;
        background: var(--surface-panel);
        padding: 16px;
        box-sizing: border-box;
        font-family: var(--3dmob-font-body);
      }
      .row {
        display: flex;
        gap: 8px;
        margin-bottom: 12px;
      }
      .sw {
        flex: 1;
        height: 56px;
        border-radius: 6px;
        display: flex;
        align-items: flex-end;
        padding: 6px;
        font: 10px/1 monospace;
        color: #fff;
      }
    </style>
  </head>
  <body>
    <div class="row">
      <div class="sw" style="background: var(--3dmob-primary)">primary</div>
      <div class="sw" style="background: var(--3dmob-secondary)">secondary</div>
      <div class="sw" style="background: var(--3dmob-accent)">accent</div>
      <div
        class="sw"
        style="
          background: linear-gradient(
            90deg,
            var(--3dmob-gradient-from),
            var(--3dmob-gradient-via),
            var(--3dmob-gradient-to)
          );
        "
      >
        gradient
      </div>
      <div class="sw" style="background: var(--3dmob-announcement-bg); color: #3a2a00">
        announcement
      </div>
    </div>
    <div
      style="
        font-family: var(--3dmob-font-heading);
        font-weight: 700;
        font-size: 20px;
        color: #1a2233;
      "
    >
      Outfit — headings ("friendly/tech")
    </div>
    <div
      style="font-family: var(--3dmob-font-body); font-size: 14px; color: #4a5568; margin-top: 4px"
    >
      Inter — body copy. Tailwind/shadcn utility classes throughout (bg-background, rounded-md),
      light + dark mode via a "dark" class.
    </div>
  </body>
</html>
