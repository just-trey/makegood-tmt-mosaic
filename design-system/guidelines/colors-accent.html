<!-- @dsCard group="Colors" viewport="700x140" subtitle="Teal accent, amber accent, danger" name="Accent & state" -->
<!doctype html>
<html>
  <head>
    <link rel="stylesheet" href="../styles.css" />
    <style>
      body {
        margin: 0;
        background: var(--surface-panel);
        font-family: var(--font-mono);
        font-size: 11px;
        color: var(--text-secondary);
        padding: 16px;
        box-sizing: border-box;
        display: flex;
        gap: 10px;
      }
      .sw {
        flex: 1;
        height: 90px;
        border-radius: 6px;
        display: flex;
        align-items: flex-end;
        padding: 8px;
        color: #0d1a1a;
      }
    </style>
  </head>
  <body>
    <div class="sw" style="background: var(--accent-primary)">--accent-primary</div>
    <div class="sw" style="background: var(--accent-secondary)">--accent-secondary</div>
    <div class="sw" style="background: var(--state-danger); color: #1a0d0d">--state-danger</div>
  </body>
</html>
