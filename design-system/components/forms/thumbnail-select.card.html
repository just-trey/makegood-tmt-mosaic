<!-- @dsCard group="Components" viewport="700x260" name="Thumbnail select" -->
<!doctype html>
<html>
  <head>
    <link rel="stylesheet" href="../../styles.css" />
    <script src="../../_ds_bundle.js"></script>
    <style>
      body {
        margin: 0;
        background: var(--surface-canvas);
        font-family: var(--font-sans);
        padding: 20px;
        box-sizing: border-box;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="text/babel">
      const { ThumbnailSelect } = window.DS;
      function Demo() {
        const [val, setVal] = React.useState('wheel-top');
        return (
          <div style={{ maxWidth: 300 }}>
            <ThumbnailSelect
              value={val}
              onChange={setVal}
              options={[
                { value: 'wheel-top', label: 'Wheel — Top', meta: 'stl/wheel-top.stl' },
                { value: 'wheel-cap', label: 'Wheel — Cap', meta: 'stl/wheel-cap.stl' },
                {
                  value: 'wheel-rim',
                  label: 'Wheel — Rim (rotated copy)',
                  meta: 'shared, pivot+angle',
                },
              ]}
            />
          </div>
        );
      }
      ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
    </script>
  </body>
</html>
