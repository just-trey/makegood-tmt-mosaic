<!-- @dsCard group="Components" viewport="700x420" name="Forms" -->
<!DOCTYPE html><html><head><link rel="stylesheet" href="../../styles.css">
<script src="../../_ds_bundle.js"></script>
<style>body{margin:0;background:var(--surface-canvas);font-family:var(--font-sans);padding:20px;box-sizing:border-box}</style>
</head><body>
<div id="root"></div>
<script type="text/babel">
const { Button, TextInput, Select, Checkbox, Slider, SegmentedControl } = window.DS;
function Demo(){
  const [num, setNum] = React.useState(80);
  const [sel, setSel] = React.useState('disc');
  const [chk, setChk] = React.useState(true);
  const [range, setRange] = React.useState(100);
  const [opt, setOpt] = React.useState('wheel');
  return (
    <div style={{display:'flex', flexDirection:'column', gap:16, maxWidth:340}}>
      <div style={{display:'flex', gap:8}}>
        <Button variant="primary">Export STL set (.zip)</Button>
        <Button>Load sample</Button>
        <Button size="small" disabled>Disabled</Button>
      </div>
      <SegmentedControl value={sel} onChange={setSel} options={[{value:'disc',label:'Disc'},{value:'rect',label:'Rect'},{value:'round',label:'Round rect'},{value:'assembly',label:'Assembly'}]} />
      <TextInput type="number" value={num} onChange={(v)=>setNum(Number(v))} step={1} />
      <Select value={opt} onChange={setOpt} options={[{value:'wheel',label:'Wheel'},{value:'cap',label:'Cap'}]} />
      <Slider value={range} min={25} max={400} onChange={setRange} valueLabel={range + '%'} />
      <Checkbox checked={chk} onChange={setChk} label="Recess bg too" />
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body></html>
