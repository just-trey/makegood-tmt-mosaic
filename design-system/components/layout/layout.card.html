<!DOCTYPE html><html><head><link rel="stylesheet" href="../../styles.css">
<script src="../../_ds_bundle.js"></script>
<style>body{margin:0;background:var(--surface-canvas);font-family:var(--font-sans);padding:20px;box-sizing:border-box}</style>
</head><body>
<div id="root"></div>
<script type="text/babel">
const { Panel, TextInput } = window.DS;
function Demo(){
  return (
    <div style={{maxWidth:320}}>
      <Panel title="Depth">
        <TextInput type="number" value={1.0} step={0.05} />
      </Panel>
      <Panel title="Colors detected">
        <div style={{color:'var(--text-secondary)', fontSize:'var(--text-md)'}}>Load an SVG to detect color regions.</div>
      </Panel>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body></html>
