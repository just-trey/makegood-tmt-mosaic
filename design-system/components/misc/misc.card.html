<!DOCTYPE html><html><head><link rel="stylesheet" href="../../styles.css">
<script src="../../_ds_bundle.js"></script>
<style>body{margin:0;background:var(--surface-canvas);font-family:var(--font-sans);padding:20px;box-sizing:border-box}</style>
</head><body>
<div id="root"></div>
<script type="text/babel">
const { Dropzone, ColorRow } = window.DS;
function Demo(){
  const [depth, setDepth] = React.useState(1.0);
  return (
    <div style={{display:'flex', flexDirection:'column', gap:14, maxWidth:360}}>
      <Dropzone label="Drop an SVG here, or click to browse" />
      <ColorRow hex="#e8a13a" areaPct={34} depth={depth} onDepthChange={setDepth} selected={false} onSelectedChange={()=>{}} />
      <ColorRow hex="#4fb0ae" areaPct={66} />
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body></html>
